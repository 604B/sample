<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=close,menu"
        />
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="stylesheet" href="css/style.css" />
        <title>popover Hamburger & tooltip sample</title>
    </head>
    <body>
        <div class="container">
            <header class="header">
                <h1 class="header__title">ページタイトル</h1>
                <button class="hamburger__button" popovertarget="menu">
                    <span class="material-symbols-outlined"> menu </span>
                </button>
                <nav class="header__nav">
                    <ul class="header__list" role="list">
                        <li class="header__item">
                            <a
                                popovertarget="nav-home"
                                href="#"
                                class="header__link"
                                aria-describedby="nav-home"
                                >Home
                            </a>
                            <div
                                id="nav-home"
                                class="header__tooltip"
                                role="tooltip"
                                popover="hint"
                            >
                                トップページへ戻ります
                            </div>
                        </li>
                        <li class="header__item">
                            <a
                                popovertarget="nav-about"
                                href="#"
                                class="header__link"
                                aria-describedby="nav-about"
                                >About
                            </a>
                            <div
                                id="nav-about"
                                class="header__tooltip"
                                role="tooltip"
                                popover="hint"
                            >
                                概要ページへのリンクです
                            </div>
                        </li>
                        <li class="header__item">
                            <a
                                popovertarget="nav-service"
                                href="#"
                                class="header__link"
                                aria-describedby="nav-service"
                                >Service
                            </a>
                            <div
                                id="nav-service"
                                class="header__tooltip"
                                role="tooltip"
                                popover="hint"
                            >
                                サービスページへのリンクです
                            </div>
                        </li>
                        <li class="header__item">
                            <a
                                popovertarget="nav-contact"
                                href="#"
                                class="header__link"
                                aria-describedby="nav-contact"
                                >Contact
                            </a>
                            <div
                                id="nav-contact"
                                class="header__tooltip"
                                role="tooltip"
                                popover="hint"
                            >
                                コンタクトページへのリンクです
                            </div>
                        </li>
                    </ul>
                </nav>
            </header>
            <!-- ハンバーガー関連 ここから -->
            <nav
                id="menu"
                popover="auto"
                class="hamburger__nav"
                role="navigation"
                aria-label="メインメニュー"
            >
                <button class="hamburger__button" popovertarget="menu" popovertargetaction="hide">
                    <span class="material-symbols-outlined"> close </span>
                </button>
                <ul class="hamburger__list" role="list">
                    <li class="hamburger__item">
                        <a
                            popovertarget="hamburger-home"
                            href="#"
                            class="hamburger__link"
                            aria-describedby="hamburger-home"
                            >Home
                        </a>
                        <div
                            id="hamburger-home"
                            class="hamburger__tooltip"
                            role="tooltip"
                            popover="hint"
                        >
                            トップページへ戻ります
                        </div>
                    </li>
                    <li class="hamburger__item">
                        <a
                            popovertarget="hamburger-about"
                            href="#"
                            class="hamburger__link"
                            aria-describedby="hamburger-about"
                            >About
                        </a>
                        <div
                            id="hamburger-about"
                            class="hamburger__tooltip"
                            role="tooltip"
                            popover="hint"
                        >
                            概要ページへのリンクです
                        </div>
                    </li>
                    <li class="hamburger__item">
                        <a
                            popovertarget="hamburger-service"
                            href="#"
                            class="hamburger__link"
                            aria-describedby="hamburger-service"
                            >Service
                        </a>
                        <div
                            id="hamburger-service"
                            class="hamburger__tooltip"
                            role="tooltip"
                            popover="hint"
                        >
                            サービスページへのリンクです
                        </div>
                    </li>
                    <li class="hamburger__item">
                        <a
                            popovertarget="hamburger-contact"
                            href="#"
                            class="hamburger__link"
                            aria-describedby="hamburger-contact"
                            >Contact
                        </a>
                        <div
                            id="hamburger-contact"
                            class="hamburger__tooltip"
                            role="tooltip"
                            popover="hint"
                        >
                            コンタクトページへのリンクです
                        </div>
                    </li>
                </ul>
            </nav>
            <!-- ハンバーガー関連　ここまで -->
        </div>
        <script src="js/tooltip.js"></script>
    </body>
</html>
