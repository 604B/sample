<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>modal sample</title>
    </head>
    <body>
        <button command="show-modal" commandfor="modal">モーダルを開く</button>
        <dialog id="modal">
            <p>モーダルの内容</p>
            <button command="close" commandfor="modal">モーダルを閉じる</button>
        </dialog>
        <section class="explanation">
            <h2 class="explanation_title">dialog要素の特徴"</h2>
            <ul class="explanation__list">
                <li class="explanation__item">最初は非表示</li>
                <li class="explanation__item">Escキーで閉じることが可能</li>
                <li class="explanation__item">表示操作次第で非モーダルにもできる</li>
            </ul>
        </section>
    </body>
</html>
